<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SKYROCK // HUD NÉON ROUGE // RECTANGULAR COCKPIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0005, #000000);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* === GRILLE HUD CYBERPUNK === */
        .hud-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(255, 0, 60, 0.07) 0px, rgba(255, 0, 60, 0.07) 1px, transparent 1px, transparent 35px),
                repeating-linear-gradient(90deg, rgba(255, 0, 60, 0.07) 0px, rgba(255, 0, 60, 0.07) 1px, transparent 1px, transparent 35px);
            pointer-events: none;
            z-index: 0;
        }

        /* scanlines */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.25) 0px, rgba(0, 0, 0, 0.25) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 2;
            opacity: 0.6;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* === CONTAINER PRINCIPAL RECTANGLE === */
        .rect-hud {
            position: relative;
            width: 780px;
            max-width: 92vw;
            background: rgba(8, 0, 4, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid #ff003c;
            border-radius: 28px;
            padding: 22px 24px 28px;
            box-shadow: 0 0 45px rgba(255, 0, 60, 0.4), inset 0 0 20px rgba(255, 0, 60, 0.1);
            transition: all 0.2s;
            z-index: 10;
        }

        /* coins décoratifs supplémentaires */
        .rect-hud::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 80px;
            height: 80px;
            border-top: 3px solid #ff2a6d;
            border-left: 3px solid #ff2a6d;
            border-radius: 20px 0 0 0;
            pointer-events: none;
        }
        .rect-hud::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 80px;
            height: 80px;
            border-bottom: 3px solid #ff2a6d;
            border-right: 3px solid #ff2a6d;
            border-radius: 0 0 20px 0;
            pointer-events: none;
        }

        /* entête HUD */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-bottom: 1px solid rgba(255, 0, 60, 0.5);
            padding-bottom: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .sys-badge {
            font-size: 0.7rem;
            background: #ff003c20;
            padding: 4px 12px;
            border-radius: 40px;
            border-left: 2px solid #ff003c;
            color: #ff7a9e;
            letter-spacing: 2px;
        }

        .neon-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff1a4f, #ff0055);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.6);
            letter-spacing: 3px;
        }

        /* zone centrale : cover + viz + controles */
        .main-panel {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 24px;
        }

        /* zone cover avec effet scan */
        .cover-area {
            flex-shrink: 0;
            position: relative;
        }

        .hud-frame {
            width: 170px;
            height: 170px;
            background: #0a0005;
            border-radius: 24px;
            border: 2px solid #ff003c;
            box-shadow: 0 0 18px rgba(255, 0, 60, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 8px #ff003c);
        }

        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent 30%, rgba(255, 30, 80, 0.25) 50%, transparent 70%);
            animation: scanMove 2.8s linear infinite;
            pointer-events: none;
        }

        @keyframes scanMove {
            0% { transform: translateX(-100%);}
            100% { transform: translateX(200%);}
        }

        /* zone visualiseur + contrôles */
        .viz-controls {
            flex: 1;
            min-width: 220px;
        }

        /* visualiseur à barres horizontales futuriste */
        .viz-bars-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 15px 12px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 0, 60, 0.4);
        }

        .viz-label {
            font-size: 0.65rem;
            color: #ff6680;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .equalizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 60px;
        }

        .eq-bar {
            width: 6px;
            background: #ff003c;
            border-radius: 3px;
            transition: height 0.07s linear;
            box-shadow: 0 0 6px #ff003c;
        }

        /* contrôles play / pause / stop */
        .action-buttons {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin: 15px 0 12px;
        }

        .ctrl-neon {
            background: rgba(0, 0, 0, 0.6);
            border: 1.8px solid #ff003c;
            border-radius: 60px;
            width: 60px;
            height: 60px;
            font-size: 28px;
            font-weight: bold;
            color: #ff3366;
            cursor: pointer;
            transition: 0.12s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }

        .ctrl-neon:hover {
            background: #ff003c30;
            transform: scale(1.05);
            box-shadow: 0 0 16px #ff003c;
        }

        /* data metrics style cockpit */
        .metrics-row {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            padding: 12px 18px;
            margin-top: 8px;
            border: 1px solid rgba(255, 0, 60, 0.3);
        }

        .metric-card {
            text-align: center;
            flex: 1;
        }
        .metric-label {
            font-size: 0.6rem;
            color: #ff99b3;
            letter-spacing: 1px;
        }
        .metric-value {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff2a6d;
            text-shadow: 0 0 5px #ff003c;
        }

        /* station selector (futuriste) */
        .station-panel {
            margin: 20px 0 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 0, 60, 0.4);
        }

        .station-icon {
            color: #ff4d6d;
            font-size: 0.8rem;
        }

        .station-select {
            flex: 1;
            background: #1a000c;
            border: none;
            color: #ff6680;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            padding: 8px 12px;
            border-radius: 40px;
            outline: none;
            cursor: pointer;
            border: 1px solid #ff003c;
            font-size: 0.8rem;
        }

        /* volume HUD linéaire */
        .volume-hud {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 0, 60, 0.5);
            margin-top: 12px;
        }

        .vol-track {
            flex: 1;
            height: 5px;
            background: #2a0010;
            position: relative;
            border-radius: 5px;
            overflow: hidden;
        }

        .vol-fill {
            width: 75%;
            height: 100%;
            background: #ff003c;
            box-shadow: 0 0 8px #ff003c;
            transition: width 0.05s;
        }

        input.vol-range {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .vol-percent {
            font-size: 0.7rem;
            color: #ff8095;
            min-width: 40px;
            text-align: right;
        }

        /* status LED */
        .live-status-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            padding-top: 10px;
            border-top: 1px dashed rgba(255, 0, 60, 0.4);
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff003c;
            box-shadow: 0 0 8px red;
            animation: pulse 1.2s infinite;
        }

        .status-text {
            font-size: 0.7rem;
            color: #ff90b0;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* responsive */
        @media (max-width: 700px) {
            .rect-hud { padding: 16px; }
            .neon-title { font-size: 1.3rem; }
            .ctrl-neon { width: 50px; height: 50px; font-size: 22px; }
            .main-panel { gap: 18px; }
            .hud-frame { width: 130px; height: 130px; }
        }
    </style>
</head>
<body>
<div class="hud-grid"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="rect-hud" id="rectHud">
    <!-- entête -->
    <div class="hud-header">
        <div class="sys-badge">[ NEO LINK // COCKPIT v2.0 ]</div>
        <div class="neon-title" id="stationTitle">SKYROCK</div>
    </div>

    <!-- zone centrale -->
    <div class="main-panel">
        <div class="cover-area">
            <div class="hud-frame">
                <img id="coverImage" class="cover-img" src="https://github.com/gunout/Skyrock_player/blob/main/play.png?raw=true" alt="cover">
                <div class="scan-overlay"></div>
            </div>
        </div>

        <div class="viz-controls">
            <!-- visualiseur -->
            <div class="viz-bars-container">
                <div class="viz-label">
                    <span>◢ AUDIO SPECTRUM ◣</span>
                    <span id="vizStatus">IDLE</span>
                </div>
                <div class="equalizer" id="eqContainer">
                    <!-- 20 barres générées JS -->
                </div>
            </div>

            <!-- boutons -->
            <div class="action-buttons">
                <button class="ctrl-neon" id="playBtn">▶</button>
                <button class="ctrl-neon" id="pauseBtn">⏸</button>
                <button class="ctrl-neon" id="stopBtn">⏹</button>
            </div>

            <!-- metrics -->
            <div class="metrics-row">
                <div class="metric-card"><div class="metric-label">BITRATE</div><div class="metric-value" id="bitrateVal">128</div></div>
                <div class="metric-card"><div class="metric-label">LATENCY</div><div class="metric-value" id="latencyVal">12</div></div>
                <div class="metric-card"><div class="metric-label">PEAK dB</div><div class="metric-value" id="peakVal">0.0</div></div>
            </div>
        </div>
    </div>

    <!-- sélecteur de station -->
    <div class="station-panel">
        <span class="station-icon">🔻 FREQ LOCK</span>
        <select id="stationSelect" class="station-select">
            <option value="https://icecast.skyrock.net/s/natio_mp3_128k">SKYROCK // MAINFRAME</option>
            <option value="https://icecast.skyrock.net/s/francais_aac_128k">100% FRANÇAIS // HEX</option>
            <option value="https://icecast.skyrock.net/s/nocturne_aac_128k">LA NOCTURNE // DARK</option>
            <option value="https://icecast.skyrock.net/s/plm_aac_128k">PLM // MEDITERRANEO</option>
            <option value="https://icecast.skyrock.net/s/hit_us_aac_128k">HIT US // ATLANTIC</option>
        </select>
    </div>

    <!-- volume HUD -->
    <div class="volume-hud">
        <span style="color:#ff4d6d;">🔊 VOL</span>
        <div class="vol-track" id="volTrack">
            <div class="vol-fill" id="volFill"></div>
            <input type="range" id="volumeSlider" class="vol-range" min="0" max="1" step="0.01" value="0.75">
        </div>
        <span class="vol-percent" id="volPercent">75%</span>
    </div>

    <!-- status bar -->
    <div class="live-status-bar">
        <div class="led"></div>
        <div class="status-text" id="liveStatusTxt">STANDBY // READY</div>
        <div style="flex:1"></div>
        <div class="status-text" id="freqDisplay">99.9 MHz</div>
    </div>
</div>

<audio id="audioStream" preload="metadata" crossorigin="anonymous">
    <source id="audioSource" src="https://icecast.skyrock.net/s/natio_mp3_128k" type="audio/mpeg">
</audio>

<script>
    (function() {
        // DOM Elements
        const audio = document.getElementById('audioStream');
        const audioSource = document.getElementById('audioSource');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const stationSelect = document.getElementById('stationSelect');
        const stationTitleSpan = document.getElementById('stationTitle');
        const volumeSlider = document.getElementById('volumeSlider');
        const volFill = document.getElementById('volFill');
        const volPercentSpan = document.getElementById('volPercent');
        const liveStatusSpan = document.getElementById('liveStatusTxt');
        const freqDisplaySpan = document.getElementById('freqDisplay');
        const bitrateSpan = document.getElementById('bitrateVal');
        const latencySpan = document.getElementById('latencyVal');
        const peakSpan = document.getElementById('peakVal');
        const eqContainer = document.getElementById('eqContainer');
        const vizStatusSpan = document.getElementById('vizStatus');
        const rectHud = document.getElementById('rectHud');
        
        let isPlaying = false;
        let eqAnimationFrame = null;
        let metricsInterval = null;
        
        // Générer 20 barres pour l'equalizer
        const BAR_COUNT = 22;
        let eqBars = [];
        for(let i=0; i<BAR_COUNT; i++) {
            let bar = document.createElement('div');
            bar.className = 'eq-bar';
            bar.style.height = '5px';
            eqContainer.appendChild(bar);
            eqBars.push(bar);
        }
        
        // fonction pour mettre à jour le visualiseur (simulation musicale dynamique)
        function updateEqualizer() {
            if (!isPlaying) {
                eqBars.forEach(bar => {
                    bar.style.height = '4px';
                    bar.style.opacity = '0.2';
                });
                if (eqAnimationFrame) cancelAnimationFrame(eqAnimationFrame);
                eqAnimationFrame = null;
                return;
            }
            
            // intensité simulée basée sur le temps + amplitude aléatoire douce
            let intensity = 0.4;
            if (audio && !audio.paused && audio.currentTime > 0) {
                const t = Date.now() / 220;
                intensity = (Math.sin(t) * 0.25 + Math.sin(t * 1.7) * 0.2 + 0.5);
                intensity = Math.min(0.95, Math.max(0.3, intensity));
            } else {
                intensity = 0.25;
            }
            
            // Pour chaque barre, hauteur différente selon position + bruit
            for (let idx = 0; idx < BAR_COUNT; idx++) {
                let factor = (idx / BAR_COUNT) * Math.PI;
                let dynamic = Math.sin(Date.now() * 0.012 + idx * 0.35) * 0.3;
                let h = (intensity * 32) + (dynamic * 12);
                h = Math.min(48, Math.max(5, h));
                eqBars[idx].style.height = h + 'px';
                eqBars[idx].style.opacity = 0.6 + intensity * 0.4;
                eqBars[idx].style.background = `#ff${Math.floor(40 + intensity * 150)}${Math.floor(40 + intensity * 100)}`;
                eqBars[idx].style.boxShadow = `0 0 ${6 + intensity * 8}px #ff003c`;
            }
            eqAnimationFrame = requestAnimationFrame(updateEqualizer);
        }
        
        // Simulation des données techniques (bitrate, latency, peak)
        function startMetricsSimulation() {
            if (metricsInterval) clearInterval(metricsInterval);
            metricsInterval = setInterval(() => {
                if (isPlaying) {
                    let bit = Math.floor(120 + Math.random() * 18);
                    bitrateSpan.textContent = bit;
                    let lat = Math.floor(8 + Math.random() * 22);
                    latencySpan.textContent = lat;
                    let peak = (Math.random() * 4.8).toFixed(1);
                    peakSpan.textContent = peak;
                } else {
                    bitrateSpan.textContent = '--';
                    latencySpan.textContent = '--';
                    peakSpan.textContent = '0.0';
                }
            }, 980);
        }
        
        // mise à jour des métadonnées de station et fréquence
        function updateStationMeta() {
            const selectedText = stationSelect.options[stationSelect.selectedIndex].text;
            let clean = selectedText.split('//')[0].trim();
            stationTitleSpan.textContent = clean.toUpperCase();
            const freqMap = {
                'SKYROCK': '99.9 MHz // NEO',
                '100% FRANÇAIS': '92.4 MHz // PARIS',
                'LA NOCTURNE': '96.2 MHz // DARK',
                'PLM': '101.1 MHz // MED',
                'HIT US': '105.7 MHz // ATL'
            };
            let key = clean;
            if(clean.includes('100%')) key = '100% FRANÇAIS';
            if(clean.includes('NOCTURNE')) key = 'LA NOCTURNE';
            if(clean.includes('PLM')) key = 'PLM';
            if(clean.includes('HIT US')) key = 'HIT US';
            if(clean.includes('SKYROCK') && !clean.includes('PLM') && !clean.includes('HIT US')) key = 'SKYROCK';
            freqDisplaySpan.textContent = freqMap[key] || '99.9 MHz';
        }
        
        // changer de station
        function changeStation() {
            const newSrc = stationSelect.value;
            const wasPlaying = isPlaying;
            audioSource.src = newSrc;
            audio.load();
            updateStationMeta();
            if (wasPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    liveStatusSpan.textContent = 'ONLINE // ACTIVE';
                    vizStatusSpan.textContent = 'LIVE';
                    if (!eqAnimationFrame) updateEqualizer();
                }).catch(err => {
                    console.warn("autoplay bloqué", err);
                    isPlaying = false;
                    liveStatusSpan.textContent = 'STANDBY // CLICK PLAY';
                    vizStatusSpan.textContent = 'IDLE';
                });
            } else {
                if (eqAnimationFrame) cancelAnimationFrame(eqAnimationFrame);
                eqAnimationFrame = null;
                eqBars.forEach(b => { b.style.height = '4px'; b.style.opacity = '0.2'; });
                vizStatusSpan.textContent = 'IDLE';
            }
        }
        
        // Volume
        function setVolume(value) {
            let vol = parseFloat(value);
            audio.volume = vol;
            volFill.style.width = (vol * 100) + '%';
            volPercentSpan.textContent = Math.round(vol * 100) + '%';
        }
        
        // Play
        function playStream() {
            if (audio.paused) {
                audio.play().then(() => {
                    isPlaying = true;
                    liveStatusSpan.textContent = 'ONLINE // ACTIVE';
                    vizStatusSpan.textContent = 'LIVE';
                    updateEqualizer();
                }).catch(e => {
                    console.error(e);
                    liveStatusSpan.textContent = 'ERROR // RETRY';
                });
            } else {
                if (!isPlaying) {
                    isPlaying = true;
                    liveStatusSpan.textContent = 'ONLINE // ACTIVE';
                    vizStatusSpan.textContent = 'LIVE';
                    updateEqualizer();
                }
            }
        }
        
        function pauseStream() {
            if (!audio.paused) {
                audio.pause();
                isPlaying = false;
                liveStatusSpan.textContent = 'PAUSED';
                vizStatusSpan.textContent = 'PAUSE';
                if (eqAnimationFrame) cancelAnimationFrame(eqAnimationFrame);
                eqAnimationFrame = null;
                eqBars.forEach(bar => {
                    bar.style.height = '4px';
                    bar.style.opacity = '0.2';
                });
            } else {
                if (isPlaying) {
                    isPlaying = false;
                    liveStatusSpan.textContent = 'PAUSED';
                    vizStatusSpan.textContent = 'PAUSE';
                    if (eqAnimationFrame) cancelAnimationFrame(eqAnimationFrame);
                    eqAnimationFrame = null;
                    eqBars.forEach(bar => {
                        bar.style.height = '4px';
                        bar.style.opacity = '0.2';
                    });
                }
            }
        }
        
        function stopStream() {
            audio.pause();
            audio.currentTime = 0;
            isPlaying = false;
            liveStatusSpan.textContent = 'STOPPED';
            vizStatusSpan.textContent = 'IDLE';
            if (eqAnimationFrame) cancelAnimationFrame(eqAnimationFrame);
            eqAnimationFrame = null;
            eqBars.forEach(bar => {
                bar.style.height = '4px';
                bar.style.opacity = '0.2';
            });
        }
        
        // Event listeners
        playBtn.addEventListener('click', playStream);
        pauseBtn.addEventListener('click', pauseStream);
        stopBtn.addEventListener('click', stopStream);
        stationSelect.addEventListener('change', changeStation);
        volumeSlider.addEventListener('input', (e) => setVolume(e.target.value));
        
        // audio events
        audio.addEventListener('playing', () => {
            isPlaying = true;
            liveStatusSpan.textContent = 'ONLINE // ACTIVE';
            vizStatusSpan.textContent = 'LIVE';
            if (!eqAnimationFrame) updateEqualizer();
        });
        audio.addEventListener('pause', () => {
            if (audio.currentTime !== 0 || audio.paused) {
                isPlaying = false;
                liveStatusSpan.textContent = 'PAUSED';
                vizStatusSpan.textContent = 'PAUSE';
            }
        });
        audio.addEventListener('waiting', () => {
            if(isPlaying) liveStatusSpan.textContent = 'BUFFER // ...';
        });
        audio.addEventListener('canplay', () => {
            if(isPlaying) liveStatusSpan.textContent = 'ONLINE // ACTIVE';
        });
        audio.addEventListener('error', () => {
            if(isPlaying) {
                liveStatusSpan.textContent = 'SIGNAL LOST';
                setTimeout(() => {
                    if(isPlaying) {
                        audio.load();
                        audio.play().catch(()=>{});
                    }
                }, 1500);
            }
        });
        
        // init
        setVolume(0.75);
        updateStationMeta();
        startMetricsSimulation();
        liveStatusSpan.textContent = 'STANDBY // READY';
        vizStatusSpan.textContent = 'IDLE';
        isPlaying = false;
        // style initial
        eqBars.forEach(b => { b.style.height = '4px'; b.style.opacity = '0.2'; });
        
        // effet de glow aléatoire sur le container (pour le style)
        setInterval(() => {
            if (isPlaying) {
                rectHud.style.boxShadow = '0 0 50px rgba(255, 0, 60, 0.5)';
                setTimeout(() => { rectHud.style.boxShadow = '0 0 45px rgba(255, 0, 60, 0.4)'; }, 200);
            } else {
                rectHud.style.boxShadow = '0 0 25px rgba(255, 0, 60, 0.2)';
            }
        }, 1800);
    })();
</script>
